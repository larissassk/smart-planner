<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Planner</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --accent: #6366f1;
            --border: #e2e8f0;
            --input-bg: #f1f5f9;
            
            /* Novas Cores Acinzentadas / Foscas por Período */
            --cor-manha: #B3E5FC;
            --cor-tarde: #FFE082;
            --cor-noite: #9FA8DA;
            --cor-madrugada: #B0BEC5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 24px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header h1 { font-size: 1.5rem; margin: 0; }

        .weekly-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 16px; 
        }

        .day-col { 
            background: var(--card-bg);
            padding: 16px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 450px;
            position: relative;
        }

        .day-title { 
            font-weight: 700; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            text-align: center; 
            color: var(--text-secondary); 
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .quick-input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            font-size: 0.85rem;
            box-sizing: border-box;
        }
        .quick-input:focus { outline: none; border-color: var(--accent); background: #fff; }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .task-card {
            font-size: 0.85rem;
            padding: 10px;
            border-radius: 8px;
            background: #ffffff;
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .task-card .time-tag { 
            font-size: 0.7rem; 
            font-weight: 700; 
            padding: 2px 6px;
            border-radius: 4px;
            width: fit-content;
            color: #333333;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .task-card .time-tag:hover { opacity: 0.8; }

        .duration-select {
            font-size: 0.65rem;
            padding: 2px;
            border-radius: 4px;
            border: 1px solid var(--border);
            outline: none;
            background: #fff;
        }

        .tag-manha { background-color: var(--cor-manha); }
        .tag-tarde { background-color: var(--cor-tarde); }
        .tag-noite { background-color: var(--cor-noite); }
        .tag-madrugada { background-color: var(--cor-madrugada); }

        .smart-popup {
            position: absolute;
            top: 90px;
            left: 16px;
            right: 16px;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            padding: 12px;
            z-index: 10;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .popup-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); }
        
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .btn-group-hours { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        
        .flow-btn {
            background: #f1f5f9;
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .flow-btn:hover { background: #e2e8f0; border-color: #94a3b8; }

        .minute-box { display: flex; gap: 4px; align-items: center; }
        .minute-box input { width: 50px; padding: 6px; text-align: center; border-radius: 6px; border: 1px solid var(--border); font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Smart Planner Semanal ⚡</h1>
    </div>

    <div class="weekly-grid" id="weeklyGrid">
        <!-- Injetado por JS -->
    </div>
</div>

<script>
    const dias = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];
    
    // Divisão exata solicitada por você
    const baseHorarios = {
        manha: ['06', '07', '08', '09', '10', '11'],
        tarde: ['12', '13', '14', '15', '16', '17'],
        noite: ['18', '19', '20', '21', '22', '23'],
        madrugada: ['00', '01', '02', '03', '04', '05']
    };

    let fluxoAtivo = { dia: '', tarefa: '', periodo: '', horaExata: '' };

    function inicializar() {
        const grid = document.getElementById('weeklyGrid');
        dias.forEach(dia => {
            let col = document.createElement('div');
            col.className = 'day-col';
            col.id = `col-${dia}`;
            col.innerHTML = `
                <div class="day-title">${dia}</div>
                <input type="text" class="quick-input" id="input-${dia}" placeholder="+ Nova atividade..." onkeydown="checarEnter(event, '${dia}')">
                <div class="smart-popup" id="popup-${dia}"></div>
                <div class="task-list" id="list-${dia}"></div>
            `;
            grid.appendChild(col);
        });
        carregarDados();
    }

    function checarEnter(event, dia) {
        if (event.key === 'Enter') {
            const input = document.getElementById(`input-${dia}`);
            if (input.value.trim() === "") return;

            fecharTodosPopups();

            fluxoAtivo.dia = dia;
            fluxoAtivo.tarefa = input.value;

            abrirPassoPeriodo(dia);
        }
    }

    function fecharTodosPopups() {
        dias.forEach(d => { document.getElementById(`popup-${d}`).style.display = 'none'; });
    }

    function abrirPassoPeriodo(dia) {
        const popup = document.getElementById(`popup-${dia}`);
        popup.innerHTML = `
            <div class="popup-title">Escolha o Período:</div>
            <div class="btn-group">
                <button class="flow-btn" onclick="escolherPeriodo('manha')">🌅 Manhã (06-11)</button>
                <button class="flow-btn" onclick="escolherPeriodo('tarde')">☀️ Tarde (12-17)</button>
                <button class="flow-btn" onclick="escolherPeriodo('noite')">🌙 Noite (18-23)</button>
                <button class="flow-btn" onclick="escolherPeriodo('madrugada')">🦉 Madruga (00-05)</button>
            </div>
        `;
        popup.style.display = 'flex';
    }

    function escolherPeriodo(periodo) {
        fluxoAtivo.periodo = periodo;
        const popup = document.getElementById(`popup-${fluxoAtivo.dia}`);
        
        let horasHTML = `<div class="popup-title">Qual Hora de (${periodo})?</div>`;
        horasHTML += `<div class="btn-group-hours">`;
        
        baseHorarios[periodo].forEach(hora => {
            horasHTML += `<button class="flow-btn" onclick="escolherHoraExata('${hora}')">${hora}h</button>`;
        });
        horasHTML += `</div>`;

        popup.innerHTML = horasHTML;
    }

    function escolherHoraExata(hora) {
        fluxoAtivo.horaExata = hora;
        const popup = document.getElementById(`popup-${fluxoAtivo.dia}`);

        popup.innerHTML = `
            <div class="popup-title">Minutos? (Opcional)</div>
            <div class="minute-box">
                <span>${hora} :</span>
                <input type="number" id="input-minutos" min="0" max="59" placeholder="00" autofocus onkeydown="checarConfirmacaoMinutos(event)">
                <button class="flow-btn" style="background: var(--accent); color: white;" onclick="salvarAtividadeFinal()">OK</button>
            </div>
        `;
        document.getElementById('input-minutos').focus();
    }

    function checarConfirmacaoMinutos(event) {
        if (event.key === 'Enter') salvarAtividadeFinal();
    }

    function salvarAtividadeFinal() {
        let minInput = document.getElementById('input-minutos').value || '00';
        if (minInput.length === 1) minInput = '0' + minInput;
        if (parseInt(minInput) > 59 || parseInt(minInput) < 0) minInput = '00';

        const horarioFinal = `${fluxoAtivo.horaExata}:${minInput}`;

        const novaAtividade = {
            id: 'task-' + Date.now(),
            tarefa: fluxoAtivo.tarefa,
            periodo: fluxoAtivo.periodo,
            horario: horarioFinal,
            duracao: ''
        };

        let salvas = JSON.parse(localStorage.getItem(`smart-${fluxoAtivo.dia}`)) || [];
        salvas.push(novaAtividade);
        salvas.sort((a, b) => a.horario.localeCompare(b.horario));

        localStorage.setItem(`smart-${fluxoAtivo.dia}`, JSON.stringify(salvas));
        document.getElementById(`input-${fluxoAtivo.dia}`).value = '';
        
        fecharTodosPopups();
        renderizarDia(fluxoAtivo.dia, salvas);
    }

    function calcularHorarioTermino(horarioInicio, minutosParaSomar) {
        let [horas, minutos] = horarioInicio.split(':').map(Number);
        let totalMinutos = horas * 60 + minutos + parseInt(minutosParaSomar);
        
        let novasHoras = Math.floor(totalMinutos / 60) % 24;
        let novosMinutos = totalMinutos % 60;
        
        return `${String(novasHoras).padStart(2, '0')}:${String(novosMinutos).padStart(2, '0')}`;
    }

    function abrirSeletorDuracao(dia, taskId, elementoTag, horarioOriginal) {
        if (elementoTag.querySelector('select')) return;

        let select = document.createElement('select');
        select.className = 'duration-select';
        select.innerHTML = `
            <option value="" disabled selected>Duração?</option>
            <option value="30">30 min</option>
            <option value="60">1 hora</option>
            <option value="120">2 horas</option>
            <option value="180">3 horas</option>
        `;

        elementoTag.innerHTML = '';
        elementoTag.appendChild(select);
        select.focus();

        select.onchange = function() {
            let minutos = select.value;
            let salvas = JSON.parse(localStorage.getItem(`smart-${dia}`)) || [];
            let idx = salvas.findIndex(t => t.id === taskId);
            
            if (idx !== -1) {
                salvas[idx].duracao = minutos;
                localStorage.setItem(`smart-${dia}`, JSON.stringify(salvas));
            }
            renderizarDia(dia, salvas);
        };

        select.onblur = function() {
            setTimeout(() => {
                let salvas = JSON.parse(localStorage.getItem(`smart-${dia}`)) || [];
                renderizarDia(dia, salvas);
            }, 150);
        };
    }

    function renderizarDia(dia, atividades) {
        const list = document.getElementById(`list-${dia}`);
        list.innerHTML = '';

        atividades.forEach(act => {
            let card = document.createElement('div');
            card.className = 'task-card';

            let textoHorario = `⏰ ${act.horario}`;
            if (act.duracao) {
                let termino = calcularHorarioTermino(act.horario, act.duracao);
                textoHorario = `⏰ ${act.horario} às ${termino}`;
            }

            card.innerHTML = `
                <div class="time-tag tag-${act.periodo}" onclick="abrirSeletorDuracao('${dia}', '${act.id}', this, '${act.horario}')">${textoHorario}</div>
                <div>${act.tarefa}</div>
            `;
            list.appendChild(card);
        });
    }

    function carregarDados() {
        dias.forEach(dia => {
            let salvas = JSON.parse(localStorage.getItem(`smart-${dia}`)) || [];
            renderizarDia(dia, salvas);
        });
    }

    window.onload = inicializar;
</script>
</body>
</html>
